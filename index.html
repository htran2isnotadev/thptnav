<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Hỗ Trợ Thi THPT - Dữ Liệu KMZ</title>
    
    <!-- Sử dụng Tailwind CSS cho giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons cho biểu tượng -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Leaflet CSS & JS (Mã nguồn mở thay thế Google Maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Thư viện JSZip dùng để giải nén file .kmz ngay tại client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Thư viện chuyển đổi KML sang GeoJSON để Leaflet có thể đọc hiểu dễ dàng -->
    <script src="https://unpkg.com/@mapbox/togeojson@0.16.0/togeojson.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100%; width: 100%; border-radius: 0.5rem; z-index: 1; }
        .custom-info-window { max-width: 250px; }
        
        /* Ẩn thanh scrollbar cho sidebar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Tạo điểm nháy cho vị trí người dùng */
        .user-marker {
            width: 16px;
            height: 16px;
            background-color: #2563EB;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .user-marker-fallback {
            background-color: #F97316; /* Màu cam nếu dùng vị trí mô phỏng */
        }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col md:flex-row">

    <!-- Sidebar / Bảng điều khiển -->
    <aside class="w-full md:w-80 lg:w-96 bg-white shadow-lg z-10 flex flex-col h-auto md:h-full shrink-0">
        <!-- Header -->
        <div class="p-5 border-b border-gray-100 bg-blue-600 text-white rounded-b-xl md:rounded-none">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="ph-fill ph-graduation-cap text-2xl"></i>
                Hỗ Trợ Thi THPT
            </h1>
            <p class="text-sm text-blue-100 mt-1">Hệ thống định vị & hỗ trợ thí sinh</p>
            <!-- Trạng thái tải dữ liệu -->
            <div id="dataStatus" class="mt-2 text-xs bg-blue-700 text-blue-100 py-1 px-2.5 rounded-md flex items-center gap-1.5 w-fit">
                <i class="ph ph-spinner animate-spin"></i> Đang tải sơ đồ...
            </div>
        </div>

        <!-- Controls -->
        <div class="p-5 flex-1 overflow-y-auto no-scrollbar flex flex-col gap-5">

            <!-- Vị trí của tôi -->
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="ph-fill ph-navigation-arrow text-blue-600"></i> Vị trí của bạn
                </h3>
                <button onclick="findMyLocation()" id="btnLocation" class="w-full bg-white border border-blue-200 hover:bg-blue-100 text-blue-700 py-2.5 rounded-lg flex items-center justify-center gap-2 font-medium transition-colors shadow-sm">
                    <i class="ph ph-crosshair"></i> Tìm vị trí hiện tại
                </button>
                <p id="locationStatus" class="text-xs font-medium mt-2 hidden"></p>
            </div>

            <!-- Bộ lọc (Ban đầu sẽ ẩn, chỉ hiện khi đã tải dữ liệu thành công) -->
            <div id="filterSection" class="opacity-50 pointer-events-none transition-all duration-300">
                <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="ph-fill ph-funnel text-orange-500"></i> Hiển thị trên bản đồ
                </h3>
                <div class="flex flex-col gap-3">
                    <label class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-100 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center text-red-600">
                                <i class="ph-fill ph-school"></i>
                            </div>
                            <span class="font-medium text-gray-700">Điểm thi (<span id="count-exam">0</span>)</span>
                        </div>
                        <input type="checkbox" checked class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500" onchange="toggleCategory('exam', this.checked)">
                    </label>

                    <label class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-100 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                                <i class="ph-fill ph-bed"></i>
                            </div>
                            <span class="font-medium text-gray-700">Nhà nghỉ (<span id="count-hotel">0</span>)</span>
                        </div>
                        <input type="checkbox" checked class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500" onchange="toggleCategory('hotel', this.checked)">
                    </label>

                    <label class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-100 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600">
                                <i class="ph-fill ph-fork-knife"></i>
                            </div>
                            <span class="font-medium text-gray-700">Ăn uống / Nhà hàng (<span id="count-food">0</span>)</span>
                        </div>
                        <input type="checkbox" checked class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500" onchange="toggleCategory('food', this.checked)">
                    </label>
                </div>
            </div>
        </div>
    </aside>

    <!-- Khu vực Bản đồ -->
    <main class="flex-1 p-2 md:p-4 bg-gray-200 relative">
        <div id="map" class="bg-white shadow-inner">
            <!-- Bản đồ Leaflet sẽ được vẽ vào đây -->
        </div>
    </main>

    <script>
        // --- BIẾN TOÀN CỤC ---
        let map;
        let userMarker = null;
        let userLocation = null;
        
        // Quản lý các layer (tương ứng với Checkbox bộ lọc)
        const layerGroups = {
            exam: L.layerGroup(),
            hotel: L.layerGroup(),
            food: L.layerGroup()
        };

        // Đếm số lượng địa điểm mỗi loại
        const counts = { exam: 0, hotel: 0, food: 0 };

        // Hàm tạo Icon theo màu sắc cho Leaflet
        function getCustomIcon(color) {
            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
        }

        const icons = {
            exam: { icon: getCustomIcon('red'), name: 'Điểm thi', colorClass: 'bg-red-100 text-red-700' },
            hotel: { icon: getCustomIcon('blue'), name: 'Nhà nghỉ', colorClass: 'bg-blue-100 text-blue-700' },
            food: { icon: getCustomIcon('green'), name: 'Ăn uống', colorClass: 'bg-green-100 text-green-700' }
        };

        // --- KHỞI TẠO BẢN ĐỒ ---
        window.onload = function() {
            // Tọa độ khởi tạo mặc định (Trung tâm Việt Nam)
            map = L.map('map').setView([16.047079, 108.206230], 6);

            // Thêm lớp nền bản đồ từ OpenStreetMap
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19,
            }).addTo(map);

            // Thêm các Layer Group vào bản đồ
            layerGroups.exam.addTo(map);
            layerGroups.hotel.addTo(map);
            layerGroups.food.addTo(map);

            // Tự động tải file KMZ từ repository khi tải trang
            autoLoadDefaultKMZ();
        };

        // --- TỰ ĐỘNG TẢI FILE KMZ TỪ REPO ---
        function autoLoadDefaultKMZ() {
            const defaultKmzPath = 'map.kmz'; // Tên file nằm cùng thư mục với file index.html trên GitHub
            const statusEl = document.getElementById('dataStatus');
            
            statusEl.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Đang tải sơ đồ thi...`;
            statusEl.className = "mt-2 text-xs bg-blue-700 text-blue-100 py-1 px-2.5 rounded-md flex items-center gap-1.5 w-fit";

            // Gọi API lấy file dưới dạng ArrayBuffer trực tiếp từ server tĩnh (GitHub Pages)
            fetch(defaultKmzPath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Chưa tìm thấy file KMZ trên máy chủ. Hãy kiểm tra xem file "map.kmz" đã được upload lên repo chưa.');
                    }
                    return response.arrayBuffer();
                })
                .then(arrayBuffer => {
                    // Giải nén file bằng thư viện JSZip đã cài đặt ở header
                    return JSZip.loadAsync(arrayBuffer);
                })
                .then(zip => {
                    const kmlFile = Object.keys(zip.files).find(name => name.endsWith('.kml'));
                    if (!kmlFile) {
                        throw new Error("Không tìm thấy tệp tin dữ liệu .kml hợp lệ bên trong file KMZ.");
                    }
                    return zip.files[kmlFile].async("string");
                })
                .then(kmlText => {
                    parseAndDisplayKml(kmlText);
                    
                    // Cập nhật trạng thái tải thành công lên header
                    statusEl.innerHTML = `<i class="ph-fill ph-check-circle"></i> Đã tải sơ đồ`;
                    statusEl.className = "mt-2 text-xs bg-green-600 text-white py-1 px-2.5 rounded-md flex items-center gap-1.5 w-fit font-medium";
                })
                .catch(err => {
                    console.warn("Tải KMZ tự động không thành công: " + err.message);
                    statusEl.innerHTML = `<i class="ph-fill ph-x-circle"></i> Lỗi dữ liệu`;
                    statusEl.className = "mt-2 text-xs bg-red-600 text-white py-1 px-2.5 rounded-md flex items-center gap-1.5 w-fit font-medium";
                    
                    alert("Không thể tải sơ đồ thi tự động. Vui lòng đảm bảo bạn đã đặt file 'map.kmz' cùng cấp thư mục với file index.html trên Github!");
                });
        }

        // Hàm phân tích XML KML sang GeoJSON và phân loại thông minh
        function parseAndDisplayKml(kmlString) {
            try {
                // Phân tích cú pháp chuỗi XML của KML
                const parser = new DOMParser();
                const kmlDom = parser.parseFromString(kmlString, "text/xml");
                
                // Sử dụng thư viện togeojson để chuyển sang GeoJSON dễ tương tác
                const geoJson = toGeoJSON.kml(kmlDom);

                // Xóa bỏ tất cả marker cũ nếu có
                Object.keys(layerGroups).forEach(key => layerGroups[key].clearLayers());
                counts.exam = 0; counts.hotel = 0; counts.food = 0;

                const bounds = L.latLngBounds();
                let hasValidPoints = false;

                // Duyệt qua từng đối tượng trong GeoJSON
                geoJson.features.forEach(feature => {
                    if (feature.geometry && feature.geometry.type === 'Point') {
                        const coords = feature.geometry.coordinates; // [lng, lat, alt]
                        const lat = coords[1];
                        const lng = coords[0];
                        const name = feature.properties.name || "Địa điểm chưa đặt tên";
                        const desc = feature.properties.description || "";

                        // Phân loại thông minh dựa vào tên và nội dung mô tả của điểm đó
                        const type = classifyPlace(name, desc);
                        counts[type]++;

                        // Thêm tọa độ điểm này vào giới hạn bản đồ để tự động căn góc nhìn
                        bounds.extend([lat, lng]);
                        hasValidPoints = true;

                        // Vẽ điểm lên đúng layer của bộ lọc
                        const config = icons[type];
                        const marker = L.marker([lat, lng], { icon: config.icon });
                        
                        // Xây dựng khung popup chi tiết
                        const popupContent = `
                            <div class="custom-info-window p-1 text-wrap">
                                <span class="inline-block px-2 py-1 rounded text-xs font-semibold mb-2 ${config.colorClass}">${config.name}</span>
                                <h3 class="text-base font-bold text-gray-800 mb-1 leading-tight">${name}</h3>
                                ${desc ? `<div class="text-xs text-gray-600 bg-gray-50 p-2 rounded mb-3 max-h-24 overflow-y-auto">${desc}</div>` : ''}
                                <button onclick="calculateRoute(${lat}, ${lng})" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-1.5 rounded text-sm transition-colors shadow-sm cursor-pointer font-semibold flex items-center justify-center gap-1.5">
                                    <i class="ph-fill ph-map-pin"></i> Chỉ đường qua Google Maps
                                </button>
                            </div>
                        `;

                        marker.bindPopup(popupContent);
                        layerGroups[type].addLayer(marker);
                    }
                });

                if (hasValidPoints) {
                    // Zoom bản đồ ôm trọn toàn bộ các điểm dữ liệu trong KMZ của bạn
                    map.fitBounds(bounds, { padding: [50, 50] });

                    // Cập nhật số lượng hiển thị lên giao diện điều khiển
                    document.getElementById('count-exam').textContent = counts.exam;
                    document.getElementById('count-hotel').textContent = counts.hotel;
                    document.getElementById('count-food').textContent = counts.food;

                    // Mở khóa các bộ lọc lọc địa điểm
                    const filterSec = document.getElementById('filterSection');
                    filterSec.classList.remove('opacity-50', 'pointer-events-none');
                } else {
                    alert("Tệp tin KMZ của bạn không chứa các tọa độ điểm mốc hợp lệ.");
                }

            } catch (err) {
                alert("Lỗi khi phân tích dữ liệu KML: " + err.message);
                console.error(err);
            }
        }

        // Hàm phân loại thông minh dựa trên từ khóa trong My Maps
        function classifyPlace(name, desc) {
            const combinedText = (name + " " + desc).toLowerCase();
            
            // 1. Nhận diện từ khóa ẨM THỰC trước (Trích xuất triệt để quán ăn khỏi Điểm thi)
            if (combinedText.includes('nhà hàng') || 
                combinedText.includes('quán') || 
                combinedText.includes('phở') || 
                combinedText.includes('cơm') || 
                combinedText.includes('bún') || 
                combinedText.includes('bánh mì') || 
                combinedText.includes('mì cay') || 
                combinedText.includes('mì') || 
                combinedText.includes('quán nước') || 
                combinedText.includes('cafe') || 
                combinedText.includes('cà phê') || 
                combinedText.includes('coffee') || 
                combinedText.includes('ăn uống') || 
                combinedText.includes('quán trà') ||
                combinedText.includes('lẩu') ||
                combinedText.includes('nướng') ||
                combinedText.includes('bán đồ ăn') ||
                combinedText.includes('fastfood') ||
                combinedText.includes('trà sữa') ||
                combinedText.includes('sinh tố') ||
                combinedText.includes('quán ăn')) {
                return 'food';
            }

            // 2. Nhận diện các từ khóa liên quan đến Nhà nghỉ / Khách sạn (Hỗ trợ từ viết sai chính tả 'hottel')
            if (combinedText.includes('khách sạn') || 
                combinedText.includes('nhà nghỉ') || 
                combinedText.includes('hotel') || 
                combinedText.includes('hottel') || 
                combinedText.includes('motel') || 
                combinedText.includes('homestay') || 
                combinedText.includes('nhà trọ') || 
                combinedText.includes('nơi ở') || 
                combinedText.includes('chỗ nghỉ') || 
                combinedText.includes('ở trọ') ||
                combinedText.includes('khách xá') ||
                combinedText.includes('nhà nghỉ giá rẻ')) {
                return 'hotel';
            }

            // 3. Nhận diện các từ khóa liên quan đến Điểm thi / Trường học
            if (combinedText.includes('trường') || 
                combinedText.includes('thpt') || 
                combinedText.includes('thcs') || 
                combinedText.includes('tiểu học') || 
                combinedText.includes('mầm non') || 
                combinedText.includes('điểm thi') || 
                combinedText.includes('phòng thi') || 
                combinedText.includes('hội đồng thi') || 
                combinedText.includes('địa điểm thi') || 
                combinedText.includes('sở gd') || 
                combinedText.includes('gd&đt') ||
                combinedText.includes('đd') || 
                combinedText.includes('sơ đồ') ||
                combinedText.includes('bảng sơ đồ')) {
                return 'exam';
            }

            // 4. Mặc định phân loại là Điểm thi nếu không có từ khóa đặc thù nào khác
            return 'exam';
        }

        // Ẩn/Hiện địa điểm trên bản đồ
        window.toggleCategory = function(category, isVisible) {
            if (isVisible) {
                map.addLayer(layerGroups[category]);
            } else {
                map.removeLayer(layerGroups[category]);
            }
        }

        // --- ĐỊNH VỊ VÀ TÌM ĐƯỜNG ---

        // Lấy vị trí người dùng
        window.findMyLocation = function() {
            const statusEl = document.getElementById('locationStatus');
            const btn = document.getElementById('btnLocation');
            
            if (!navigator.geolocation) {
                alert("Trình duyệt của bạn không hỗ trợ định vị.");
                return;
            }

            statusEl.classList.remove('hidden');
            statusEl.textContent = "Đang lấy tọa độ...";
            btn.classList.add('opacity-50');

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    handleLocationSuccess(position.coords.latitude, position.coords.longitude);
                    statusEl.textContent = "Đã tìm thấy vị trí!";
                    statusEl.className = "text-xs font-medium mt-2 text-green-600";
                    btn.classList.remove('opacity-50');
                },
                (error) => {
                    console.warn("Bị chặn GPS. Đang mô phỏng vị trí trung tâm dữ liệu.");
                    
                    // Lấy vị trí trung tâm hiện tại của các marker trên bản đồ để mô phỏng cho sát thực tế nhất
                    let fallbackLat = 18.684110;
                    let fallbackLng = 105.665545;

                    // Nếu người dùng đã tải KMZ, ta lấy đại một điểm trong đó làm gốc giả định để thử nghiệm
                    let foundPoints = false;
                    Object.keys(layerGroups).forEach(key => {
                        const layers = layerGroups[key].getLayers();
                        if (layers.length > 0 && !foundPoints) {
                            const firstMarker = layers[0].getLatLng();
                            fallbackLat = firstMarker.lat + 0.005; // Lệch một chút làm điểm xuất phát
                            fallbackLng = firstMarker.lng - 0.005;
                            foundPoints = true;
                        }
                    });

                    handleLocationSuccess(fallbackLat, fallbackLng, true);
                    
                    statusEl.textContent = "Đã dùng vị trí mô phỏng gần vùng thi (Do trình duyệt chặn GPS).";
                    statusEl.className = "text-xs font-medium mt-2 text-orange-600";
                    btn.classList.remove('opacity-50');
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        function handleLocationSuccess(lat, lng, isFallback = false) {
            userLocation = { lat, lng };

            // Tạo icon cho vị trí người dùng
            const iconHtml = `<div class="user-marker ${isFallback ? 'user-marker-fallback' : ''}"></div>`;
            const icon = L.divIcon({
                className: 'custom-user-icon',
                html: iconHtml,
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            if (userMarker) {
                userMarker.setLatLng([lat, lng]);
                userMarker.setIcon(icon);
            } else {
                userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                userMarker.bindPopup(isFallback ? "<b>Vị trí mô phỏng gần đây</b>" : "<b>Vị trí thực tế của bạn</b>");
            }

            map.setView([lat, lng], 15);
        }

        // Khởi chạy Google Maps để dẫn đường
        window.calculateRoute = function(destLat, destLng) {
            // Đóng popup đang mở trên Leaflet
            map.closePopup();

            // Lấy tọa độ xuất phát nếu có
            let originStr = "";
            if (userLocation) {
                originStr = `${userLocation.lat},${userLocation.lng}`;
            }

            // Tạo URL chỉ đường của Google Maps API (Nếu origin rỗng, Google Maps sẽ tự lấy "Vị trí của tôi")
            const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${originStr}&destination=${destLat},${destLng}&travelmode=driving`;

            // Mở liên kết trong tab mới hoặc khởi chạy App Google Maps trên điện thoại
            window.open(googleMapsUrl, '_blank');
        }
    </script>
</body>
</html>
